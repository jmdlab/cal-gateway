name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: build / vet / fmt / test / vuln
    runs-on: ubuntu-latest
    env:
      # Pure-Go stack: build static, and avoid the cgo/`as` toolchain gotcha.
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: gofmt (fail on diff)
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "These files are not gofmt-clean:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test
        # Unit tests are mocked (no network). Live tests self-skip: they require
        # CALGW_LIVE / CALGW_LIVE_SEND, which are never set here.
        run: go test ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
